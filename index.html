<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناوبری اینرسی با فیلتر مکمل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Vazirmatn:wght@100..900&display=swap');
        * { font-family: 'Vazirmatn', 'Inter', sans-serif; }
        body { background: #f3f4f6; }
        .card { background: white; border-radius: 0.75rem; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .value { font-family: monospace; font-size: 0.95rem; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

<div class="w-full max-w-6xl space-y-4">

    <header class="bg-gradient-to-r from-indigo-800 to-purple-800 text-white p-6 rounded-2xl flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold">🧭 ناوبری اینرسی با فیلتر مکمل</h1>
            <p class="text-indigo-200 text-sm">تلفیق شتاب‌سنج + ژیروسکوپ + مغناطیس‌سنج</p>
        </div>
        <div class="flex gap-3 flex-wrap">
            <button id="navBtn" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-xl font-bold shadow-lg transition flex items-center gap-2">
                <span>▶</span> شروع ناوبری
            </button>
            <button id="resetBtn" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 rounded-xl font-bold shadow-lg transition text-white">
                ↺ ریست
            </button>
        </div>
    </header>

    <!-- وضعیت -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="card"><span class="text-gray-500">وضعیت:</span> <span id="navStatus" class="font-bold text-amber-600">آماده</span></div>
        <div class="card"><span class="text-gray-500">زاویه Pitch:</span> <span id="pitchAngle" class="value text-blue-600">0.0°</span></div>
        <div class="card"><span class="text-gray-500">زاویه Roll:</span> <span id="rollAngle" class="value text-green-600">0.0°</span></div>
        <div class="card"><span class="text-gray-500">زاویه Yaw:</span> <span id="yawAngle" class="value text-purple-600">0.0°</span></div>
    </div>

    <!-- موقعیت و سرعت -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="card">
            <h3 class="font-bold text-gray-700 border-b pb-2 mb-2">📍 موقعیت (متر)</h3>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><span class="text-gray-400 text-xs">X</span><br><span id="posX" class="value text-red-600">0.00</span></div>
                <div><span class="text-gray-400 text-xs">Y</span><br><span id="posY" class="value text-red-600">0.00</span></div>
                <div><span class="text-gray-400 text-xs">Z</span><br><span id="posZ" class="value text-red-600">0.00</span></div>
            </div>
        </div>
        <div class="card">
            <h3 class="font-bold text-gray-700 border-b pb-2 mb-2">📊 شتاب خالص و سرعت</h3>
            <div class="grid grid-cols-2 gap-2 text-center">
                <div><span class="text-gray-400 text-xs">شتاب X</span><br><span id="netAccX" class="value">0.00</span></div>
                <div><span class="text-gray-400 text-xs">شتاب Y</span><br><span id="netAccY" class="value">0.00</span></div>
                <div><span class="text-gray-400 text-xs">شتاب Z</span><br><span id="netAccZ" class="value">0.00</span></div>
                <div><span class="text-gray-400 text-xs">سرعت (m/s)</span><br><span id="speedVal" class="value">0.00</span></div>
            </div>
        </div>
    </div>

    <!-- لاگ -->
    <div class="card">
        <h3 class="text-sm font-semibold text-gray-500 mb-2">📋 پیش‌نمایش لاگ</h3>
        <div id="logPreview" class="bg-gray-50 h-32 overflow-hidden relative rounded border p-2 font-mono text-[0.65rem]">
            <div class="absolute inset-0 flex items-center justify-center text-gray-300 pointer-events-none">PREVIEW</div>
            <div id="logContent" class="relative z-10"></div>
        </div>
    </div>
</div>

<script type="module">
// ================================================================
//  کتابخانه برداری
// ================================================================
const vec = {
    norm: a => Math.sqrt(a.reduce((s,v) => s + v*v, 0)),
    add: (a,b) => a.map((v,i) => v + b[i]),
    sub: (a,b) => a.map((v,i) => v - b[i]),
    scale: (a,s) => a.map(v => v * s),
    clamp: (a,min,max) => a.map(v => Math.min(Math.max(v, min), max))
};

// ================================================================
//  فیلتر مکمل (برای زوایا)
// ================================================================
class ComplementaryFilter {
    constructor(alpha = 0.98, dt = 0.02) {
        this.alpha = alpha; // ضریب وزن برای ژیروسکوپ
        this.dt = dt;
        this.pitch = 0;
        this.roll = 0;
        this.yaw = 0;
    }

    // به‌روزرسانی با داده‌های شتاب (زاویه از شتاب) و ژیروسکوپ (نرخ زاویه) و مغناطیس (yaw)
    update(accPitch, accRoll, gyroRates, magYaw = null) {
        // یکپارچه‌سازی ژیروسکوپ
        const gyroPitch = this.pitch + gyroRates[0] * this.dt;
        const gyroRoll = this.roll + gyroRates[1] * this.dt;
        let gyroYaw = this.yaw + gyroRates[2] * this.dt;

        // فیلتر مکمل برای Pitch و Roll
        this.pitch = this.alpha * gyroPitch + (1 - this.alpha) * accPitch;
        this.roll = this.alpha * gyroRoll + (1 - this.alpha) * accRoll;

        // برای Yaw، اگر مغناطیس در دسترس باشد، از آن استفاده می‌کنیم
        if (magYaw !== null) {
            // نرمال‌سازی اختلاف زاویه
            let diff = magYaw - gyroYaw;
            diff = Math.atan2(Math.sin(diff), Math.cos(diff)); // محدوده [-pi, pi]
            this.yaw = gyroYaw + (1 - this.alpha) * diff;
        } else {
            this.yaw = gyroYaw;
        }

        return { pitch: this.pitch, roll: this.roll, yaw: this.yaw };
    }
}

// ================================================================
//  وضعیت کلی
// ================================================================
const state = {
    isNavigating: false,
    isCalibrating: false,
    calibStartTime: 0,
    calibDuration: 5, // ثانیه

    // بایاس‌ها
    accBias: [0, 0, 0],
    gyroBias: [0, 0, 0],
    accSamples: [],
    gyroSamples: [],

    // داده‌های ناوبری
    pos: [0, 0, 0],
    vel: [0, 0, 0],

    // فیلتر مکمل
    filter: new ComplementaryFilter(0.98, 0.02),

    // داده‌های خام و پردازش‌شده
    rawAcc: [0, 0, 0],
    rawGyro: [0, 0, 0],
    rawMag: [0, 0, 0],
    gravity: [0, 0, 0],
    netAcc: [0, 0, 0],      // شتاب خالص (بدون جاذبه) در دستگاه

    // فیلتر پایین‌گذر روی شتاب
    filteredAcc: [0, 0, 0],
    alphaLP: 0.15,           // ضریب فیلتر پایین‌گذر

    // آستانه حرکت (برای جلوگیری از دریفت)
    motionThreshold: 0.08,   // m/s²
    isMoving: false,

    // آمار
    pointCount: 0,
    lastTimestamp: 0,
    magInitialized: false
};

// ================================================================
//  المان‌های DOM
// ================================================================
const $ = id => document.getElementById(id);
const el = {
    navBtn: $('navBtn'),
    resetBtn: $('resetBtn'),
    navStatus: $('navStatus'),
    pitchAngle: $('pitchAngle'),
    rollAngle: $('rollAngle'),
    yawAngle: $('yawAngle'),
    posX: $('posX'), posY: $('posY'), posZ: $('posZ'),
    netAccX: $('netAccX'), netAccY: $('netAccY'), netAccZ: $('netAccZ'),
    speedVal: $('speedVal'),
    logContent: $('logContent')
};

// ================================================================
//  توابع کمکی
// ================================================================
function calcTiltFromAcc(acc) {
    // محاسبه Pitch و Roll از شتاب (در حالت سکون یا حرکت کم)
    const [ax, ay, az] = acc;
    const pitch = Math.atan2(ay, Math.sqrt(ax*ax + az*az));
    const roll = Math.atan2(-ax, az);
    return { pitch, roll };
}

function gravityVector(pitch, roll) {
    const cp = Math.cos(pitch), sp = Math.sin(pitch);
    const cr = Math.cos(roll), sr = Math.sin(roll);
    return [ -sp, sr * cp, cr * cp ];
}

function accToWorld(acc, pitch, roll, yaw) {
    const cp = Math.cos(pitch), sp = Math.sin(pitch);
    const cr = Math.cos(roll), sr = Math.sin(roll);
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const R = [
        [ cy*cp,  cy*sp*sr - sy*cr,  cy*sp*cr + sy*sr ],
        [ sy*cp,  sy*sp*sr + cy*cr,  sy*sp*cr - cy*sr ],
        [ -sp,    cp*sr,             cp*cr ]
    ];
    return [
        R[0][0]*acc[0] + R[0][1]*acc[1] + R[0][2]*acc[2],
        R[1][0]*acc[0] + R[1][1]*acc[1] + R[1][2]*acc[2],
        R[2][0]*acc[0] + R[2][1]*acc[1] + R[2][2]*acc[2]
    ];
}

// ================================================================
//  مدیریت سنسورها
// ================================================================
let lastMotionTime = 0;

function handleMotion(event) {
    const now = performance.now() / 1000;
    const dt = Math.min(now - lastMotionTime, 0.05);
    lastMotionTime = now;

    const acc = event.accelerationIncludingGravity || { x:0, y:0, z:0 };
    const rot = event.rotationRate || { alpha:0, beta:0, gamma:0 };

    state.rawAcc = [acc.x || 0, acc.y || 0, acc.z || 0];
    state.rawGyro = [rot.beta || 0, rot.gamma || 0, rot.alpha || 0];

    // کالیبراسیون
    if (state.isCalibrating) {
        state.accSamples.push([...state.rawAcc]);
        state.gyroSamples.push([...state.rawGyro]);
        const elapsed = now - state.calibStartTime;
        if (elapsed >= state.calibDuration) {
            finishCalibration();
        }
        return;
    }

    if (!state.isNavigating) return;

    // ۱. تصحیح بایاس
    const accCorrected = state.rawAcc.map((v, i) => v - state.accBias[i]);
    const gyroCorrected = state.rawGyro.map((v, i) => v - state.gyroBias[i]);

    // ۲. فیلتر پایین‌گذر روی شتاب
    state.filteredAcc = state.filteredAcc.map((v, i) =>
        state.alphaLP * accCorrected[i] + (1 - state.alphaLP) * v
    );

    // ۳. محاسبه زوایای شتاب (Pitch, Roll) از شتاب فیلترشده
    const tilt = calcTiltFromAcc(state.filteredAcc);
    const accPitch = tilt.pitch;
    const accRoll = tilt.roll;

    // ۴. به‌روزرسانی فیلتر مکمل با ژیروسکوپ (نرخ‌ها به رادیان بر ثانیه)
    const gyroRates = gyroCorrected.map(v => v * Math.PI / 180);
    // برای Yaw از مغناطیس‌سنج استفاده می‌کنیم (اگر مقداردهی شده باشد)
    let magYaw = null;
    if (state.magInitialized) {
        // محاسبه Yaw از مغناطیس: در حالت ایده‌آل باید با استفاده از ماتریس چرخش محاسبه شود
        // ولی برای سادگی از همان azimuth استفاده می‌کنیم (با فرض اینکه گوشی افقی است)
        // در عمل باید زاویه Magnetic Declination را هم تصحیح کرد
        const magX = state.rawMag[0], magY = state.rawMag[1];
        if (magX !== 0 || magY !== 0) {
            magYaw = Math.atan2(magY, magX);
        }
    }

    // به‌روزرسانی فیلتر
    const angles = state.filter.update(accPitch, accRoll, gyroRates, magYaw);
    const pitch = angles.pitch;
    const roll = angles.roll;
    const yaw = angles.yaw;

    // ذخیره زوایا در state برای نمایش
    state.pitch = pitch;
    state.roll = roll;
    state.yaw = yaw;

    // ۵. تخمین جاذبه و حذف آن
    const grav = gravityVector(pitch, roll);
    state.gravity = grav;
    state.netAcc = vec.sub(state.filteredAcc, grav);

    // ۶. تشخیص حرکت بر اساس اندازه شتاب خالص
    const accMag = vec.norm(state.netAcc);
    state.isMoving = accMag > state.motionThreshold;

    // ۷. تبدیل به دستگاه جهانی
    const accWorld = accToWorld(state.netAcc, pitch, roll, yaw);

    // ۸. انتگرال‌گیری با شرط حرکت
    if (state.isMoving) {
        const newVel = state.vel.map((v, i) => v + accWorld[i] * dt);
        const newPos = state.pos.map((p, i) => p + state.vel[i] * dt + 0.5 * accWorld[i] * dt * dt);
        state.vel = newVel;
        state.pos = newPos;
    } else {
        // در حالت سکون، سرعت را میرا کن
        state.vel = state.vel.map(v => v * 0.9);
        // موقعیت را ثابت نگه دار
    }

    // ۹. محدود کردن سرعت
    state.vel = vec.clamp(state.vel, -5, 5);

    state.pointCount++;
    updateUI();
}

// ================================================================
//  مدیریت مغناطیس‌سنج
// ================================================================
function initMagnetometer() {
    if (!('Magnetometer' in window)) {
        console.warn('Magnetometer not supported');
        return;
    }
    try {
        const mag = new Magnetometer({ frequency: 10 });
        mag.addEventListener('reading', () => {
            state.rawMag = [mag.x, mag.y, mag.z];
            state.magInitialized = true;
        });
        mag.start();
    } catch (e) {
        console.warn('Magnetometer init error:', e);
    }
}

// ================================================================
//  کالیبراسیون
// ================================================================
function startCalibration() {
    if (state.isNavigating) return;
    state.isCalibrating = true;
    state.calibStartTime = performance.now() / 1000;
    state.accSamples = [];
    state.gyroSamples = [];
    el.navStatus.textContent = '⏳ کالیبره... گوشی ثابت!';
    el.navStatus.className = 'font-bold text-amber-600';
    el.navBtn.disabled = true;
}

function finishCalibration() {
    state.isCalibrating = false;
    el.navBtn.disabled = false;

    if (state.accSamples.length === 0) {
        el.navStatus.textContent = '❌ خطا در کالیبره';
        return;
    }

    const accSum = state.accSamples.reduce((acc, s) => acc.map((v, i) => v + s[i]), [0,0,0]);
    state.accBias = accSum.map(v => v / state.accSamples.length);

    const gyroSum = state.gyroSamples.reduce((acc, s) => acc.map((v, i) => v + s[i]), [0,0,0]);
    state.gyroBias = gyroSum.map(v => v / state.gyroSamples.length);

    el.navStatus.textContent = '✅ کالیبره شد';
    el.navStatus.className = 'font-bold text-green-600';

    // مقداردهی اولیه فیلتر
    const tilt = calcTiltFromAcc(state.accBias);
    state.filter.pitch = tilt.pitch;
    state.filter.roll = tilt.roll;
    state.filter.yaw = 0; // می‌توان از مغناطیس برای مقداردهی استفاده کرد

    // شروع ناوبری
    startNavigation();
}

// ================================================================
//  کنترل ناوبری
// ================================================================
function startNavigation() {
    if (state.isNavigating) return;
    state.isNavigating = true;
    state.pos = [0, 0, 0];
    state.vel = [0, 0, 0];
    state.pointCount = 0;
    state.filteredAcc = [0, 0, 0];
    el.navStatus.textContent = '🚀 ناوبری فعال';
    el.navStatus.className = 'font-bold text-blue-600';
    el.navBtn.textContent = '⏹ توقف';
    el.navBtn.className = 'px-6 py-3 bg-rose-600 hover:bg-rose-700 rounded-xl font-bold shadow-lg transition text-white';
    el.logContent.innerHTML = '';
    // راه‌اندازی مگنتومتر
    initMagnetometer();
}

function stopNavigation() {
    state.isNavigating = false;
    el.navStatus.textContent = '⏹ متوقف';
    el.navStatus.className = 'font-bold text-gray-600';
    el.navBtn.textContent = '▶ شروع';
    el.navBtn.className = 'px-6 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-xl font-bold shadow-lg transition text-white';
}

function resetAll() {
    stopNavigation();
    state.pos = [0, 0, 0];
    state.vel = [0, 0, 0];
    state.pointCount = 0;
    state.accBias = [0, 0, 0];
    state.gyroBias = [0, 0, 0];
    state.filter.pitch = 0;
    state.filter.roll = 0;
    state.filter.yaw = 0;
    state.filteredAcc = [0, 0, 0];
    state.magInitialized = false;
    state.rawMag = [0, 0, 0];
    el.navStatus.textContent = '🔄 ریست شد';
    el.navStatus.className = 'font-bold text-gray-600';
    el.logContent.innerHTML = '';
    updateUI();
}

// ================================================================
//  به‌روزرسانی UI
// ================================================================
function updateUI() {
    const pitch = state.filter.pitch || 0;
    const roll = state.filter.roll || 0;
    const yaw = state.filter.yaw || 0;

    el.pitchAngle.textContent = (pitch * 180 / Math.PI).toFixed(1) + '°';
    el.rollAngle.textContent = (roll * 180 / Math.PI).toFixed(1) + '°';
    el.yawAngle.textContent = (yaw * 180 / Math.PI).toFixed(1) + '°';

    el.posX.textContent = state.pos[0].toFixed(2);
    el.posY.textContent = state.pos[1].toFixed(2);
    el.posZ.textContent = state.pos[2].toFixed(2);

    el.netAccX.textContent = state.netAcc[0]?.toFixed(2) || '0.00';
    el.netAccY.textContent = state.netAcc[1]?.toFixed(2) || '0.00';
    el.netAccZ.textContent = state.netAcc[2]?.toFixed(2) || '0.00';
    el.speedVal.textContent = vec.norm(state.vel).toFixed(2);

    // لاگ
    if (state.pointCount % 5 === 0 && state.isNavigating) {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.textContent = `${time} | Pos: ${state.pos.map(v=>v.toFixed(1)).join(', ')} | Spd: ${vec.norm(state.vel).toFixed(1)}`;
        el.logContent.insertBefore(div, el.logContent.firstChild);
        if (el.logContent.children.length > 8) el.logContent.removeChild(el.logContent.lastChild);
    }
}

// ================================================================
//  رویداد دکمه‌ها
// ================================================================
el.navBtn.addEventListener('click', () => {
    if (state.isNavigating) {
        stopNavigation();
        return;
    }
    // اگر قبلاً کالیبره شده، مستقیم شروع کن
    if (state.accBias.some(v => v !== 0) && state.gyroBias.some(v => v !== 0)) {
        startNavigation();
        return;
    }
    startCalibration();
});

el.resetBtn.addEventListener('click', resetAll);

// ================================================================
//  راه‌اندازی سنسورها
// ================================================================
window.addEventListener('devicemotion', handleMotion);
window.addEventListener('deviceorientation', (event) => {
    // برای مقداردهی اولیه Yaw با مغناطیس (در صورت عدم دسترسی به Magnetometer API)
    if (event.alpha !== null && !state.magInitialized) {
        // تبدیل به رادیان
        const alphaRad = event.alpha * Math.PI / 180;
        // فرض می‌کنیم گوشی افقی است و مغناطیس در دسترس نیست
        // فقط برای نمایش
    }
});

console.log('🧭 ناوبری با فیلتر مکمل آماده است.');
</script>
</body>
</html>
